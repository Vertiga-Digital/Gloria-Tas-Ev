<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor | Gloria Taş Ev</title>
    <!-- Yönlendirme Metası -->
    <meta http-equiv="refresh" content="0; url=menu-modern.html">
    <style>
        body {
            background-color: #3B2A20; /* Koyu Kahve */
            color: #F5EDE2; /* Krem */
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .redirect-link {
            color: #C97B3D; /* Sıcak Amber */
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid #C97B3D;
            padding-bottom: 2px;
            transition: opacity 0.3s ease;
        }
        .redirect-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="message">Menüye yönlendiriliyorsunuz...</div>
    <div style="font-size: 0.9rem; opacity: 0.8;">
        Eğer otomatik yönlendirme gerçekleşmezse <br><br>
        <a href="menu-modern.html" class="redirect-link">Lütfen buraya tıklayın</a>
    </div>

    <script>
        // JS ile ek güvence
        setTimeout(function() {
            window.location.replace("menu-modern.html");
        }, 200);
    </script>
</body>
</html>

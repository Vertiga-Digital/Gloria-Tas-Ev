<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gloria Taş Ev - Modern Menü</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           CSS DEĞİŞKENLERİ & TEMEL AYARLAR
           ========================================================================== */
        :root {
            --color-dark-brown: #3B2A20;
            --color-warm-amber: #C97B3D;
            --color-cream: #F5EDE2;
            --color-dark-green: #4A5D3A;
            --color-bg: #1A120E; /* Mağara karanlığı */
            
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            
            --glass-bg: rgba(245, 237, 226, 0.08);
            --glass-border: rgba(245, 237, 226, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-cream);
            line-height: 1.5;
            padding-bottom: 80px; /* Alt boşluk */
        }

        /* Arkaplan dokusu için ince gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(201, 123, 61, 0.15), transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================================
           HEADER & STICKY ELEMENTLER
           ========================================================================== */
        .sticky-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 18, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--color-warm-amber);
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .lang-switch {
            display: flex;
            gap: 0.5rem;
            background: var(--glass-bg);
            padding: 0.3rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .lang-switch button {
            background: transparent;
            border: none;
            color: rgba(245, 237, 226, 0.5);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-switch button.active {
            background: var(--color-warm-amber);
            color: #fff;
        }


        /* Kategori Sekmeleri (Chips) */
        .categories-nav {
            display: flex;
            overflow-x: auto;
            gap: 0.8rem;
            padding: 0 1.5rem 1rem;
            scrollbar-width: none; /* Firefox */
        }
        
        .categories-nav::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .category-chip {
            white-space: nowrap;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--color-cream);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .category-chip.active {
            background: var(--color-warm-amber);
            border-color: var(--color-warm-amber);
            color: #fff;
            box-shadow: 0 4px 12px rgba(201, 123, 61, 0.3);
        }

        /* ==========================================================================
           MENÜ İÇERİĞİ & KARTLAR
           ========================================================================== */
        main {
            padding: 1rem 1.5rem;
        }

        .menu-section {
            margin-bottom: 3rem;
            scroll-margin-top: 180px; /* Sticky header yüksekliği telafisi */
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--color-warm-amber);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-card {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: var(--color-dark-brown);
        }

        .product-info {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.3rem;
        }

        .product-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--color-cream);
            line-height: 1.2;
        }

        .product-price {
            font-weight: 700;
            color: var(--color-warm-amber);
            font-size: 1.1rem;
            white-space: nowrap;
            margin-left: 0.5rem;
        }

        .product-desc {
            font-size: 0.85rem;
            color: rgba(245, 237, 226, 0.6);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ==========================================================================
           MODAL (ÜRÜN DETAYI)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: flex-end; /* Mobilde alttan çıkması için */
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            cursor: pointer; /* iOS tıklama sorunu için */
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 100%;
            max-height: 90vh;
            background: var(--color-bg);
            border-radius: 24px 24px 0 0;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-drag-handle {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 4px;
            z-index: 10;
            cursor: pointer; /* Tıklanabilir algısı */
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 15px 5px rgba(0,0,0,0.4);
        }

        .modal-img-container {
            position: relative;
            width: 100%;
            height: clamp(180px, 30vh, 280px);
            background-color: var(--color-dark-brown);
        }

        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
        }

        .modal-img-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--color-dark-brown), var(--color-bg));
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(245, 237, 226, 0.2);
            font-size: 4rem;
            z-index: 1;
        }

        .modal-img-gradient {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, transparent, var(--color-bg));
            pointer-events: none;
            z-index: 3;
        }

        .modal-body {
            padding: 1.5rem;
            position: relative;
            z-index: 4;
            margin-top: -10px;
        }

        .modal-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--color-warm-amber);
            line-height: 1.2;
        }

        .modal-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-cream);
        }

        .modal-desc {
            font-size: 1rem;
            color: rgba(245, 237, 226, 0.8);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-allergens {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            color: rgba(245, 237, 226, 0.6);
        }

        .modal-allergens i {
            color: var(--color-warm-amber);
            margin-right: 0.5rem;
        }

        /* ==========================================================================
           FOOTER & BUTONLAR
           ========================================================================== */
        .bottom-actions {
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .back-link {
            color: rgba(245, 237, 226, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .no-results {
            text-align: center;
            color: rgba(245, 237, 226, 0.5);
            padding: 2rem;
            display: none;
        }

        /* PRELOADER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }
        #preloader.fade-out { opacity: 0; visibility: hidden; }
        .preloader-logo {
            width: 140px; height: 140px; border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out alternate;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; } }

        /* MASAÜSTÜ/TABLET İÇİN MODAL OPTİMİZASYONU */
        @media (min-width: 768px) {
            .modal-overlay {
                align-items: center;
            }
            .modal-content {
                max-width: 480px;
                margin: 0 auto;
                border-radius: 24px;
            }
            .modal-img-container {
                height: clamp(280px, 35vh, 380px);
            }
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <img src="favicon.png" alt="Gloria Taş Ev Logo" class="preloader-logo">
    </div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var p = document.getElementById('preloader');
                if(p) {
                    p.classList.add('fade-out');
                    setTimeout(function() { p.style.display = 'none'; }, 600);
                }
            }, 300);
        });
    </script>

    <!-- STICKY ÜST ALAN -->
    <div class="sticky-container">
        <header>
            <a href="index.html" class="logo">Gloria Taş Ev</a>
            <div class="lang-switch">
                <button class="active" onclick="switchLang('tr')">TR</button>
                <button onclick="switchLang('en')">EN</button>
            </div>
        </header>


        <nav class="categories-nav" id="categoriesNav">
            <!-- Kategoriler JS ile buraya yüklenecek -->
        </nav>
    </div>

    <!-- MENÜ İÇERİĞİ -->
    <main id="menuContainer">
        <!-- JS ile ürünler buraya yüklenecek -->
    </main>

    <!-- ALT AKSİYONLAR -->
    <div class="bottom-actions">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön</a>
    </div>

    <!-- ÜRÜN DETAY MODALI -->
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()" id="modalContent">
            <div class="modal-drag-handle" onclick="closeModal(true)"></div>
            <button class="close-btn" onclick="closeModal(true)"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-img-container">
                <div class="modal-img-placeholder" id="modalImgPlaceholder">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <img src="" alt="" class="modal-img" id="modalImg" loading="lazy">
                <div class="modal-img-gradient"></div>
            </div>
            <div class="modal-body">
                <div class="modal-title-row">
                    <h2 class="modal-title" id="modalTitle">Ürün Adı</h2>
                    <span class="modal-price" id="modalPrice">₺0</span>
                </div>
                <p class="modal-desc" id="modalDesc">Detaylı açıklama buraya gelecek.</p>
                <div class="modal-allergens" id="modalAllergens">
                    <i class="fa-solid fa-circle-exclamation"></i> <span>Alerjen notu bulunmuyor.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================================================
         JAVASCRIPT
         ========================================================================== -->
    <script>
        // --- 1. MENÜ VERİ YAPISI ---
        // Bu veriyi sonradan veritabanından çekilecek veya kolayca değiştirilecek şekilde ayarlıyoruz.
        const menuData = [
            {
                id: "starters",
                title_tr: "Başlangıçlar",
                title_en: "Starters",
                items: [
                    {
                        name_tr: "Günün Çorbası", name_en: "Soup of the Day",
                        price: "₺180",
                        desc_tr: "Taş fırında yavaş pişmiş, yöresel baharatlarla tatlandırılmış taze çorba.",
                        desc_en: "Slow-cooked in a stone oven, fresh soup flavored with local spices.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Gluten ve süt ürünleri içerebilir.", allergens_en: "May contain gluten and dairy."
                    },
                    {
                        name_tr: "Humus Pastırmalı", name_en: "Hummus with Pastrami",
                        price: "₺280",
                        desc_tr: "Kayseri pastırması ve sıcak tereyağı ile servis edilen enfes humus.",
                        desc_en: "Delicious hummus served with Kayseri pastrami and hot butter.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Susam (tahin) içerir.", allergens_en: "Contains sesame (tahini)."
                    }
                ]
            },
            {
                id: "mains",
                title_tr: "Ana Yemekler",
                title_en: "Main Courses",
                items: [
                    {
                        name_tr: "Meşhur Testi Kebabı", name_en: "Famous Pottery Kebab",
                        price: "₺850",
                        desc_tr: "Kapadokya'nın geleneksel toprak testisinde, ağır ateşte saatlerce pişmiş kuzu eti, arpacık soğan ve domates.",
                        desc_en: "Lamb cooked slowly for hours with shallots and tomatoes in a traditional Cappadocia clay pot.",
                        img: "images/testi-kebabi.png",
                        allergens_tr: "Alerjen içermez.", allergens_en: "No allergens."
                    },
                    {
                        name_tr: "Saç Kavurma", name_en: "Sauteed Meat",
                        price: "₺750",
                        desc_tr: "Özel saçta pişirilmiş ince doğranmış dana eti, köy biberi ve taze domates.",
                        desc_en: "Finely chopped beef cooked on a special iron plate with local peppers and tomatoes.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Alerjen içermez.", allergens_en: "No allergens."
                    }
                ]
            },
            {
                id: "pides",
                title_tr: "Odun Ateşinde Pideler",
                title_en: "Wood-Fired Pitas",
                items: [
                    {
                        name_tr: "Kavurmalı Kaşarlı Pide", name_en: "Roasted Meat & Cheese Pita",
                        price: "₺420",
                        desc_tr: "Taş fırından taze çıkmış, bol malzemeli efsanevi lezzet.",
                        desc_en: "Fresh from the stone oven, legendary flavor with plenty of ingredients.",
                        img: "images/pide.png",
                        allergens_tr: "Gluten ve süt ürünleri içerir.", allergens_en: "Contains gluten and dairy."
                    },
                    {
                        name_tr: "Kuşbaşılı Pide", name_en: "Diced Meat Pita",
                        price: "₺450",
                        desc_tr: "Özel marine edilmiş kuşbaşı dana eti ve incecik hamur.",
                        desc_en: "Specially marinated diced beef on thin dough.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Gluten içerir.", allergens_en: "Contains gluten."
                    }
                ]
            },
            {
                id: "drinks",
                title_tr: "İçecekler",
                title_en: "Beverages",
                items: [
                    {
                        name_tr: "Ev Yapımı Ayran", name_en: "Homemade Ayran",
                        price: "₺90",
                        desc_tr: "Bol köpüklü, doğal köy yoğurdundan.",
                        desc_en: "Frothy, made from natural village yogurt.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Süt ürünü içerir.", allergens_en: "Contains dairy."
                    },
                    {
                        name_tr: "Taze Sıkım Portakal", name_en: "Fresh Orange Juice",
                        price: "₺150",
                        desc_tr: "Günlük sıkılmış 100% portakal suyu.",
                        desc_en: "Daily squeezed 100% orange juice.",
                        img: "images/gallery-mock.png",
                        allergens_tr: "Alerjen içermez.", allergens_en: "No allergens."
                    }
                ]
            }
        ];

        let currentLang = 'tr';
        let observer;

        // --- 2. RENDER İŞLEMLERİ ---
        function initMenu() {
            renderCategories();
            renderMenuItems();
            setupIntersectionObserver();
        }

        function renderCategories() {
            const nav = document.getElementById('categoriesNav');
            nav.innerHTML = '';
            
            menuData.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `category-chip ${index === 0 ? 'active' : ''}`;
                btn.dataset.target = cat.id;
                btn.textContent = currentLang === 'tr' ? cat.title_tr : cat.title_en;
                
                btn.onclick = () => {
                    document.getElementById(`section-${cat.id}`).scrollIntoView({ behavior: 'smooth' });
                };
                
                nav.appendChild(btn);
            });
        }

        function renderMenuItems() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            menuData.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'menu-section';
                section.id = `section-${cat.id}`;

                const title = document.createElement('h2');
                title.className = 'section-title';
                title.textContent = currentLang === 'tr' ? cat.title_tr : cat.title_en;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'menu-grid';

                cat.items.forEach(item => {
                    const name = currentLang === 'tr' ? item.name_tr : item.name_en;
                    const desc = currentLang === 'tr' ? item.desc_tr : item.desc_en;
                    const allergens = currentLang === 'tr' ? item.allergens_tr : item.allergens_en;

                    const card = document.createElement('div');
                    card.className = 'product-card';
                    // Modal açılış verisini bağlıyoruz
                    card.onclick = () => openModal(item);

                    card.innerHTML = `
                        <img src="${item.img}" alt="${name}" class="product-img" loading="lazy">
                        <div class="product-info">
                            <div class="product-header">
                                <h3 class="product-title">${name}</h3>
                                <span class="product-price">${item.price}</span>
                            </div>
                            <p class="product-desc">${desc}</p>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
            
            // Render sonrası observer'ı tekrar bağlıyoruz
            setupIntersectionObserver();
        }

        // --- 3. DİL DEĞİŞTİRME ---
        function switchLang(lang) {
            currentLang = lang;
            
            // Buton aktiflik durumu
            document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Geri dön butonu
            document.querySelector('.back-link').innerHTML = lang === 'tr'
                ? (new URLSearchParams(window.location.search).get('src') === 'qr'
                    ? '<i class="fa-solid fa-globe"></i> Web Sitemizi Ziyaret Edin'
                    : '<i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön')
                : (new URLSearchParams(window.location.search).get('src') === 'qr'
                    ? '<i class="fa-solid fa-globe"></i> Visit Our Website'
                    : '<i class="fa-solid fa-arrow-left"></i> Back to Home');

            // Yeniden render
            renderCategories();
            renderMenuItems();
        }


        // --- 5. SCROLL (KATEGORİ İZLEME) ---
        function setupIntersectionObserver() {
            if (observer) observer.disconnect();

            const options = {
                root: null,
                rootMargin: '-180px 0px -50% 0px', // Sticky header'ın altına göre hesapla
                threshold: 0
            };

            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id.replace('section-', '');
                        updateActiveChip(id);
                    }
                });
            }, options);

            document.querySelectorAll('.menu-section').forEach(section => {
                observer.observe(section);
            });
        }

        function updateActiveChip(id) {
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.dataset.target === id) {
                    chip.classList.add('active');
                    // Tıklanan chip'i görünür alana kaydır
                    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        }

        // --- 6. MODAL KONTROLLERİ ---
        function openModal(item) {
            const name = currentLang === 'tr' ? item.name_tr : item.name_en;
            const desc = currentLang === 'tr' ? item.desc_tr : item.desc_en;
            const allergens = currentLang === 'tr' ? item.allergens_tr : item.allergens_en;

            const modalImg = document.getElementById('modalImg');
            const placeholder = document.getElementById('modalImgPlaceholder');

            // Görsel yüklenene kadar veya hata verirse placeholder göster
            modalImg.style.opacity = '0';
            placeholder.style.display = 'flex';
            
            modalImg.onload = () => {
                modalImg.style.opacity = '1';
            };
            
            modalImg.onerror = () => {
                modalImg.style.opacity = '0';
            };
            
            modalImg.src = item.img;

            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalPrice').textContent = item.price;
            document.getElementById('modalDesc').textContent = desc;
            document.querySelector('#modalAllergens span').textContent = allergens;

            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Arka plan kaymasını engelle
            document.body.style.touchAction = 'none'; // iOS Safari scroll kilidi
        }

        function closeModal(force = false) {
            // Sadece overlay'e (koyu arka plana) veya X/Sürükle çubuğuna tıklanırsa kapat
            if (force === true || event.target.id === 'productModal') {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = '';
                document.body.style.touchAction = '';
            }
        }

        // --- 7. KAYDIRARAK KAPATMA (SWIPE-TO-CLOSE) ---
        let touchStartY = 0;
        let touchEndY = 0;
        const modalContent = document.getElementById('modalContent');

        modalContent.addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        modalContent.addEventListener('touchend', e => {
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const scrollTop = modalContent.scrollTop;
            // İçerik en üstteyse ve belirgin bir şekilde (80px'den fazla) aşağı kaydırıldıysa kapat
            if (touchEndY - touchStartY > 80 && scrollTop <= 0) {
                closeModal(true);
            }
        }

        // --- BAŞLAT ---
        document.addEventListener('DOMContentLoaded', () => {
            initMenu();

            // QR kaynağı kontrolü
            const urlParams = new URLSearchParams(window.location.search);
            const isFromQR = urlParams.get('src') === 'qr';
            if (isFromQR) {
                const backLink = document.querySelector('.back-link');
                if (backLink) {
                    backLink.innerHTML = '<i class="fa-solid fa-globe"></i> Web Sitemizi Ziyaret Edin';
                    backLink.href = 'index.html';
                }
            }
        });

    </script>
</body>
</html>
